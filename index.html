<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing_tool 1.2</title>
     <link rel="shortcut icon" href="./img/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./media.css">
</head>
<body>
 <div class="container">
       <label for="color-pick-input">Pick a color</label>
<input type="color" id="color-pick-input" value="#000000">
<ul id="color-list" class="color-list"></ul>

<label for="line-width-input">Line width</label>
<!-- Тут строго type="range" -->
<input type="range" id="line-width-input" min="1" max="40" value="5">

<ul id="tools-list" class="tools-list"></ul>
<canvas id="drawing-board"></canvas> 

<div class="buttons">
    <button id="clear-btn" class="btn">Clear</button>
    <button id="save-btn" class="btn">Save</button>
</div>

 </div>

    <script src="./script.js"></script>
</body>
</html>
